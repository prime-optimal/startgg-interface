<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>startgg ops</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>startgg ops</h1>
        <p id="connectionStatus">Disconnected</p>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </header>

    <main>
      <section class="panel">
        <div class="grid">
          <label>
            Server
            <input id="serverUrl" autocomplete="off" inputmode="url" />
          </label>
          <label>
            Operator PIN
            <input id="operatorToken" autocomplete="off" type="password" />
          </label>
          <label>
            Tournament
            <input id="tournamentId" inputmode="numeric" />
          </label>
          <label>
            Event
            <input id="eventId" inputmode="numeric" />
          </label>
          <label>
            Phase group
            <input id="phaseGroupId" inputmode="numeric" />
          </label>
        </div>
        <div class="actions">
          <button id="connectButton" type="button">Connect</button>
          <button id="saveButton" type="button">Save</button>
        </div>
      </section>

      <section id="sessionSetup" class="panel session-setup" hidden>
        <h2>Organizer setup</h2>
        <p>
          To enable registration-email resends, sign in to start.gg, open DevTools Network,
          right-click any start.gg request, choose Copy as cURL, and paste it here. Only the
          <code>gg_session</code> value is kept in server memory.
        </p>
        <label>
          start.gg session or Copy as cURL
          <textarea id="sessionInput" rows="4" autocomplete="off"></textarea>
        </label>
        <div class="actions">
          <button id="configureSessionButton" type="button">Enable resends</button>
          <span id="sessionStatus" class="session-status">Not configured</span>
        </div>
      </section>

      <nav class="tabs" aria-label="match views">
        <button class="tab active" data-view="current" type="button">Current</button>
        <button class="tab" data-view="upcoming" type="button">Upcoming</button>
        <button class="tab" data-view="completed" type="button">Completed</button>
        <button class="tab" data-view="contacts" type="button">Contacts</button>
      </nav>

      <section id="message" class="message" hidden></section>
      <section id="matches" class="match-list"></section>
    </main>

    <template id="matchTemplate">
      <article class="match">
        <div class="match-head">
          <div>
            <div class="round"></div>
            <div class="meta"></div>
          </div>
          <span class="state"></span>
        </div>
        <div class="players"></div>
        <div class="match-controls">
          <label>
            Station
            <select class="station-select"></select>
          </label>
          <button class="assign-button" type="button">Assign</button>
          <button class="call-button" type="button">Call</button>
          <button class="progress-button" type="button">Start</button>
        </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
